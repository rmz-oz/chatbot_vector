version: '3.9'

services:

  db:
    image: pgvector/pgvector:pg15
    container_name: chatbot_db
    env_file: .env
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chatbot_network

  redis:
    image: redis:7-alpine
    container_name: chatbot_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chatbot_network

  ollama:
    image: ollama/ollama:latest
    container_name: chatbot_ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - chatbot_network
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    container_name: chatbot_ollama_init
    volumes:
      - ollama_data:/root/.ollama
    depends_on:
      ollama:
        condition: service_started
    networks:
      - chatbot_network
    entrypoint: >
      sh -c "
        sleep 20 &&
        OLLAMA_HOST=ollama ollama pull llama3.2:3b &&
        OLLAMA_HOST=ollama ollama pull nomic-embed-text &&
        echo 'All models downloaded.'
      "
    restart: "no"

  web:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    container_name: chatbot_web
    command: >
      sh -c "
        python wait_for_db.py &&
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput &&
        python manage.py loaddata /app/fixtures/knowledge_fixture.json.gz &&
        (python manage.py generate_embeddings || echo 'Embedding generation skipped') &
        gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120
      "
    volumes:
      - static_files:/app/staticfiles
    ports:
      - "8002:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    networks:
      - chatbot_network
    restart: unless-stopped

networks:
  chatbot_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  static_files:
  ollama_data: